let active="overview";
function render(){
  // Nav
  let doneC=0,totalC=0;
  sections.forEach(s=>{if(s.redlines){s.redlines.forEach(r=>{totalC++;if(r.p==="done")doneC++})}});
  document.getElementById("done-count").textContent=doneC+" done";
  document.getElementById("open-count").textContent=(totalC-doneC)+" open";
  let navH="";
  sections.forEach(s=>{navH+=`<button class="${active===s.id?'active':''}" onclick="go('${s.id}')"><span class="ico">${s.icon}</span>${s.label}</button>`});
  document.getElementById("nav-btns").innerHTML=navH;
  // Content
  const sec=sections.find(s=>s.id===active);
  let h=`<h1>${sec.title}</h1><p class="intro">${sec.intro}</p>`;
  if(sec.details){sec.details.forEach((d,i)=>{h+=`<div class="detail-card"><h3>${d.heading}</h3>`;if(d.text)h+=`<p>${d.text}</p>`;if(d.items){h+="<ul>";d.items.forEach(it=>{h+=`<li>${it}</li>`});h+="</ul>"}h+="</div>"})}
  if(sec.redlines){sec.redlines.forEach((r,i)=>{const cls=r.l?"clickable":"";h+=`<div class="redline rl-${r.p} ${cls}" id="rl-${i}" onclick="${r.l?`toggleRL(${i})`:''}">`
  h+=`<div class="top"><div class="left"><div class="badges-row"><span class="badge badge-${r.p}">${({critical:"CRITICAL",important:"IMPORTANT",moderate:"MODERATE",done:"DONE",open:"OPEN"})[r.p]}</span><span class="sec">${r.s}</span></div><p class="desc">${r.a}</p></div>`;if(r.l)h+=`<span class="toggle" id="tgl-${i}">▼ Language</span>`;h+=`</div>`;if(r.l)h+=`<div class="lang" id="lang-${i}">${r.l}</div>`;h+=`</div>`})}
  if(sec.changeLogs){sec.changeLogs.forEach((cl,i)=>{h+=`<div class="cl-group" id="clg-${i}"><button class="cl-header" onclick="toggleCL(${i})"><span class="cl-title">${cl.doc}</span><span class="cl-right"><span class="cl-count">${cl.count}</span><span id="clga-${i}">▼</span></span></button><div class="cl-body">`;cl.items.forEach(it=>{h+=`<div class="cl-item"><span class="cl-num">#${it.n}</span><span class="cl-sec">${it.s}</span><span class="cl-type type-${it.t}">${it.t}</span><span class="cl-desc">${it.d}</span></div>`});h+=`</div></div>`})}
  if(sec.checks){sec.checks.forEach((c,ci)=>{h+=`<div class="check-section"><div class="check-head"><h3>${c.cat}</h3><span class="cnt" id="cnt-${ci}">0/${c.items.length}</span></div><div class="progress-bar"><div class="progress-fill" id="pf-${ci}" style="width:0%"></div></div>`;c.items.forEach((it,ii)=>{h+=`<label class="check-label" id="cl-${ci}-${ii}"><input type="checkbox" onchange="toggleCheck(${ci},${ii},${c.items.length})">${it}</label>`});h+=`</div>`})}
  document.getElementById("content").innerHTML=h;
}
function go(id){active=id;render();document.querySelector("main").scrollTop=0}
function toggleRL(i){const el=document.getElementById("rl-"+i);el.classList.toggle("expanded");const t=document.getElementById("tgl-"+i);t.textContent=el.classList.contains("expanded")?"▲ Hide":"▼ Language"}
function toggleCL(i){document.getElementById("clg-"+i).classList.toggle("open");const a=document.getElementById("clga-"+i);a.textContent=a.textContent==="▼"?"▲":"▼"}
function toggleCheck(ci,ii,total){const lbl=document.getElementById("cl-"+ci+"-"+ii);const inp=lbl.querySelector("input");lbl.classList.toggle("checked",inp.checked);const sec=lbl.closest(".check-section");const boxes=sec.querySelectorAll("input[type=checkbox]");let done=0;boxes.forEach(b=>{if(b.checked)done++});document.getElementById("cnt-"+ci).textContent=done+"/"+total;document.getElementById("cnt-"+ci).className=done===total?"cnt all-done":"cnt";const pf=document.getElementById("pf-"+ci);pf.style.width=(done/total*100)+"%";pf.className=done===total?"progress-fill complete":"progress-fill"}
render();
</script>
